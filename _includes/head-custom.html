<meta name="ms-verify" content="REPLACE_WITH_TOKEN_FROM_MARKETPLACE" />
<style>
  .page-header {
    background: #0a0a0a;
    background-image: none;
    padding: 4rem 1rem 3rem;
  }
  .adsum-logo {
    max-width: 380px;
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 1.5rem;
  }
  .project-tagline {
    color: #9ca3af;
    opacity: 1;
    margin: 1rem auto;
    max-width: 640px;
    font-size: 1.15rem;
  }
  .page-header .btn {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.3);
  }
  .page-header .btn:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 255, 255, 0.5);
  }
  .main-content h1 {
    color: #000;
  }
  .main-content h2,
  .main-content h3,
  .main-content h4,
  .main-content h5,
  .main-content h6 {
    color: #d76947;
  }
  .main-content a,
  .main-content a:visited {
    color: #00a9ce;
    text-decoration: underline;
  }
  .main-content a:hover {
    color: #0086a3;
  }
</style>
<script>
  // Open external links (different host) in a new tab. Internal anchors and
  // same-site links keep default behaviour. GitHub strips this script in the
  // repo view, so it only affects the published webpage.
  document.addEventListener("DOMContentLoaded", function () {
    var here = window.location.hostname;
    document.querySelectorAll('.main-content a[href^="http"]').forEach(function (a) {
      if (a.hostname && a.hostname !== here) {
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener noreferrer");
      }
    });
  });
</script>
